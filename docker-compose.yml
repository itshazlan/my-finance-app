services:
  db:
    image: postgres:15-alpine
    container_name: finance-db
    platform: linux/arm64
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user_finance}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password_aman}
      POSTGRES_DB: ${DB_NAME:-finance_tracker}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_finance -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  db_data: